name: Build Electron Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.5.0)'
        required: true

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: electron

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Electron
        run: npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

      - name: Upload Mac artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: electron
          fetch-depth: 0

      - uses: actions/download-artifact@v4

      - name: Generate release notes with AI
        id: ai-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMITS=$(git log --oneline -30)
          echo "$COMMITS" > /tmp/commits.txt
          jq -n \
            --arg commits "$(cat /tmp/commits.txt)" \
            --arg version "${{ github.event.inputs.version }}" \
            '{
              "model": "gpt-4o-mini",
              "messages": [
                {
                  "role": "system",
                  "content": "Ты — разработчик. Напиши красивые заметки к релизу приложения на русском языке. Формат: Markdown. Используй эмодзи. Кратко опиши что нового."
                },
                {
                  "role": "user",
                  "content": "Вот коммиты для релиза \($version):\n\n\($commits)"
                }
              ],
              "temperature": 0.7,
              "max_tokens": 1000
            }' > /tmp/payload.json
          RESPONSE=$(curl -s "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json)
          NOTES=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          if [ -z "$NOTES" ]; then
            NOTES="## Что нового в ${{ github.event.inputs.version }}

- Обновление фронтенда и бэкенда
- Облачные проекты и авторизация
- Сборка для Windows, macOS и Linux"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: CodePen Pro ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          body: ${{ steps.ai-notes.outputs.notes }}
          files: |
            windows-build/*
            mac-build/*
            linux-build/*

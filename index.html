<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-K68BMLSGHC"></script>
<script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CodePen Pro</title>
    <meta name="description" content="Онлайн редактор кода HTML, CSS и JavaScript">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
    <link rel="stylesheet" href="lib/codemirror/codemirror.min.css">
    <link rel="stylesheet" href="lib/codemirror/theme/dracula.min.css">
    <link rel="stylesheet" href="lib/codemirror/theme/monokai.min.css">
    <link rel="stylesheet" href="lib/codemirror/theme/material.min.css">
    <link rel="stylesheet" href="lib/codemirror/theme/solarized.min.css">
    <link rel="stylesheet" href="lib/codemirror/addon/show-hint.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>CodePen Pro</h1>
        <div class="controls">
            <button id="run-btn" title="Ctrl+Enter">▶ Run</button>
            <button id="format-btn" title="Форматировать код">🎨 Format</button>
            <button id="fullscreen-btn" title="Полный экран превью">⛶ Fullscreen</button>
            <button id="open-raw-btn" title="Открыть Raw в новой вкладке">📄 Raw</button>
            <button id="snow-btn" title="Включить/выключить снегопад">❄️ Snow</button>
            <button id="settings-btn" title="Настройки">⚙️ Настройки</button>
        </div>
    </header>
        <main>
        <div class="editor-container">
            <div class="tabs">
                <button class="tab active" data-tab="html">HTML</button>
                <button class="tab" data-tab="css">CSS</button>
                <button class="tab" data-tab="js">JS</button>
                <div class="status-bar">
                    <span id="cursor-info">Ln 1, Col 1</span>
                    <span id="char-count">0 символов</span>
                </div>
            </div>
            
            <div class="editors">
                <div id="html-editor" class="editor active"></div>
                <div id="css-editor" class="editor"></div>
                <div id="js-editor" class="editor"></div>
            </div>

            <div class="console-container">
                <div class="console-header">
                    <span>Console</span>
                    <button id="clear-console" title="Очистить консоль">🗑</button>
                </div>
                <div id="console" class="console"></div>
            </div>
        </div>

        <div class="resizer" id="resizer"></div>

        <div class="preview-container">
            <div class="preview-header">
                <span>Preview</span>
                <div class="preview-controls">
                    <button id="preview-desktop" class="preview-size-btn active" title="Desktop">🖥️</button>
                    <button id="preview-tablet" class="preview-size-btn" title="Tablet">📱</button>
                    <button id="preview-mobile" class="preview-size-btn" title="Mobile">📲</button>
                    <button id="refresh-preview" title="Обновить превью">🔄</button>
                </div>
            </div>
            <div class="preview-wrapper">
                <iframe id="preview" srcdoc="<html><body></body></html>"></iframe>
            </div>
        </div>
    </main>
    <script src="lib/lz-string.min.js"></script>
    <script src="lib/jszip.min.js"></script>
    <script src="lib/codemirror/codemirror.min.js"></script>
    <script src="lib/codemirror/mode/xml.min.js"></script>
    <script src="lib/codemirror/mode/htmlmixed.min.js"></script>
    <script src="lib/codemirror/mode/css.min.js"></script>
    <script src="lib/codemirror/mode/javascript.min.js"></script>
    <script src="lib/codemirror/addon/show-hint.min.js"></script>
    <script src="lib/codemirror/addon/html-hint.min.js"></script>
    <script src="lib/codemirror/addon/css-hint.min.js"></script>
    <script src="lib/codemirror/addon/javascript-hint.min.js"></script>
    <script src="lib/codemirror/addon/closebrackets.min.js"></script>
    <script src="lib/codemirror/addon/closetag.min.js"></script>
    <script src="lib/codemirror/addon/foldcode.min.js"></script>
    <script src="lib/codemirror/addon/foldgutter.min.js"></script>
    <script src="lib/codemirror/addon/xml-fold.min.js"></script>
    <script src="lib/codemirror/addon/indent-fold.min.js"></script>
    <script src="lib/codemirror/addon/brace-fold.min.js"></script>
    <script src="lib/codemirror/addon/comment-fold.min.js"></script>
    <script src="lib/codemirror/addon/search.min.js"></script>
    <script src="lib/codemirror/addon/searchcursor.min.js"></script>
    <script src="lib/codemirror/addon/jump-to-line.min.js"></script>
    <script src="lib/codemirror/addon/dialog.min.js"></script>
    <link rel="stylesheet" href="lib/codemirror/addon/dialog.min.css">
    <link rel="stylesheet" href="lib/codemirror/addon/foldgutter.min.css">
    <script src="lib/prettier-standalone.js"></script>
    <script src="lib/prettier-parser-html.min.js"></script>
    <script src="lib/prettier-parser-postcss.min.js"></script>
    <script src="lib/prettier-parser-babel.min.js"></script>
    <script src="script.js"></script>
    
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ Настройки</h2>
                <button id="close-settings" class="close-btn">✕</button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <h3>🎨 Внешний вид</h3>
                    <div class="setting-item">
                        <label for="modal-theme-select">Тема редактора:</label>
                        <select id="modal-theme-select">
                            <option value="default">Light</option>
                            <option value="dracula">Dracula</option>
                            <option value="monokai">Monokai</option>
                            <option value="material">Material</option>
                            <option value="solarized">Solarized</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="modal-global-theme-select">Глобальная тема интерфейса:</label>
                        <select id="modal-global-theme-select">
                            <option value="light">Светлая</option>
                            <option value="dark">Тёмная</option>
                            <option value="blue">Синяя</option>
                            <option value="purple">Фиолетовая</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="modal-ignore-alerts"> 
                            Игнорировать alert/confirm/prompt
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="modal-inject-theme-css"> 
                            Использовать глобальную тему в CSS сайта
                        </label>
                    </div>
                </div>

                <div class="settings-section">
                    <h3>📚 Библиотеки</h3>
                    <div class="setting-item">
                        <label for="modal-library-select">Подключить библиотеку:</label>
                        <select id="modal-library-select">
                            <option value="">No Library</option>
                            <option value="https://code.jquery.com/jquery-3.6.0.min.js">jQuery</option>
                            <option value="https://unpkg.com/react@18/umd/react.development.js">React</option>
                            <option value="https://unpkg.com/vue@3/dist/vue.global.js">Vue 3</option>
                            <option value="https://cdn.tailwindcss.com">Tailwind CSS</option>
                            <option value="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">Bootstrap CSS</option>
                            <option value="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">Three.js</option>
                        </select>
                    </div>
                </div>

                <div class="settings-section">
                    <h3>📁 Проекты</h3>
                    <div class="setting-item">
                        <label for="modal-project-select">Текущий проект:</label>
                        <select id="modal-project-select">
                            <option value="default">Проект 1</option>
                        </select>
                    </div>
                    <div class="setting-item project-buttons">
                        <button id="modal-new-project-btn" class="settings-btn success">+ Новый проект</button>
                        <button id="modal-delete-project-btn" class="settings-btn danger">🗑 Удалить проект</button>
                    </div>
                </div>

                <div class="settings-section">
                    <h3>💾 Файлы</h3>
                    <div class="setting-item project-buttons">
                        <button id="modal-save-btn" class="settings-btn primary">💾 Сохранить проект</button>
                        <button id="modal-export-btn" class="settings-btn primary">📦 Экспорт в ZIP</button>
                        <button id="modal-import-btn" class="settings-btn primary">📥 Импорт из ZIP</button>
                        <button id="modal-share-btn" class="settings-btn primary">🔗 Поделиться</button>
                        <button id="modal-share-fullscreen-btn" class="settings-btn primary">🖥️ Поделиться (полный экран)</button>
                        <button id="modal-share-raw-btn" class="settings-btn primary">📄 Поделиться (чистый HTML)</button>
                        <button id="modal-update-raw-btn" class="settings-btn primary">🔄 Обновить Raw ссылку</button>
                        <button id="modal-qr-btn" class="settings-btn primary">📱 QR-код</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden elements for compatibility -->
    <div style="display: none;">
        <select id="theme-select">
            <option value="default">Light</option>
            <option value="dracula">Dracula</option>
            <option value="monokai">Monokai</option>
            <option value="material">Material</option>
            <option value="solarized">Solarized</option>
        </select>
        <select id="library-select">
            <option value="">No Library</option>
            <option value="https://code.jquery.com/jquery-3.6.0.min.js">jQuery</option>
            <option value="https://unpkg.com/react@18/umd/react.development.js">React</option>
            <option value="https://unpkg.com/vue@3/dist/vue.global.js">Vue 3</option>
            <option value="https://cdn.tailwindcss.com">Tailwind CSS</option>
            <option value="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">Bootstrap CSS</option>
            <option value="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">Three.js</option>
        </select>
        <select id="project-select">
            <option value="default">Проект 1</option>
        </select>
        <select id="global-theme-select">
            <option value="light">Светлая</option>
            <option value="dark">Тёмная</option>
            <option value="blue">Синяя</option>
            <option value="purple">Фиолетовая</option>
        </select>
        <input type="checkbox" id="ignore-alerts">
        <input type="checkbox" id="inject-theme-css">
    </div>
    
    <!-- Toast notifications container -->
    <div id="toast-container"></div>
    
    <!-- Fullscreen overlay -->
    <div id="fullscreen-overlay" class="fullscreen-overlay">
        <div class="fullscreen-header">
            <span>Preview - Fullscreen</span>
            <button id="exit-fullscreen">✕ Exit</button>
        </div>
        <iframe id="fullscreen-preview"></iframe>
    </div>

    <!-- QR Code Modal -->
    <div id="qr-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📱 QR-код проекта</h2>
                <button id="close-qr-modal" class="close-btn">✕</button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <div class="setting-item">
                        <label>Название проекта:</label>
                        <input type="text" id="qr-project-name" readonly>
                    </div>
                    <div class="setting-item">
                        <label>URL проекта:</label>
                        <textarea id="qr-project-url" rows="3" readonly></textarea>
                    </div>
                    <div class="qr-code-container">
                        <div id="qr-code-display"></div>
                        <div id="qr-loading" style="display: none;">
                            <p>Генерация QR-кода...</p>
                        </div>
                    </div>
                    <div class="setting-item project-buttons">
                        <button id="download-qr-btn" class="settings-btn primary" style="display: none;">💾 Скачать QR-код</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Prompt Modal -->
    <div id="prompt-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="prompt-modal-title">Введите значение</h2>
                <button id="close-prompt-modal" class="close-btn">✕</button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <div class="setting-item">
                        <label id="prompt-modal-label">Введите значение:</label>
                        <input type="text" id="prompt-modal-input" autofocus>
                    </div>
                    <div class="setting-item project-buttons">
                        <button id="prompt-modal-ok" class="settings-btn success">OK</button>
                        <button id="prompt-modal-cancel" class="settings-btn">Отмена</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
